<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dadlani Family</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --navy:    #1A2340;
      --gold:    #C9A84C;
      --gold-lt: #E2C97E;
      --cream:   #F7F4EF;
      --slate:   #8A93A6;
      --white:   #FFFFFF;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--navy);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Hero ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px 60px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle radial glow behind crest */
    .hero::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Ornament / crest ── */
    .crest {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
    }

    .crest-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }

    .crest-line.right {
      background: linear-gradient(to left, transparent, var(--gold));
    }

    .crest-diamond {
      width: 10px;
      height: 10px;
      border: 1px solid var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* ── Family name ── */
    .family-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(56px, 10vw, 112px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cream);
      line-height: 1;
      margin-bottom: 6px;
    }

    .family-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(14px, 2vw, 18px);
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    /* Bottom crest mirror */
    .crest-bottom {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 48px;
    }

    .crest-bottom .crest-line {
      width: 80px;
    }

    /* ── Tagline ── */
    .tagline {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: clamp(13px, 1.6vw, 15px);
      letter-spacing: 0.12em;
      color: var(--slate);
      text-transform: uppercase;
      max-width: 380px;
      line-height: 2;
    }

    /* ── Divider section ── */
    .divider-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      margin: 0 auto;
      max-width: 700px;
      width: 100%;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(201,168,76,0.2);
    }

    .divider-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold);
      margin: 0 20px;
      opacity: 0.6;
    }

    /* ── Footer strip ── */
    .footer {
      padding: 36px 24px;
      text-align: center;
    }

    .footer p {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: rgba(138,147,166,0.5);
      text-transform: uppercase;
    }

    /* ── Subtle entrance animation ── */
    @media (prefers-reduced-motion: no-preference) {
      .family-name,
      .family-subtitle,
      .crest,
      .crest-bottom,
      .tagline {
        opacity: 0;
        animation: fadeUp 0.9s ease forwards;
      }

      .crest            { animation-delay: 0.1s; }
      .family-name      { animation-delay: 0.3s; }
      .family-subtitle  { animation-delay: 0.5s; }
      .crest-bottom     { animation-delay: 0.5s; }
      .tagline          { animation-delay: 0.7s; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .crest-line, .crest-bottom .crest-line {
        width: 48px;
      }
    }
  </style>
</head>
<body>

  <main class="hero">

    <div class="crest" aria-hidden="true">
      <div class="crest-line"></div>
      <div class="crest-diamond"></div>
      <div class="crest-line right"></div>
    </div>

    <h1 class="family-name">Dadlani</h1>
    <p class="family-subtitle">Est. &nbsp;·&nbsp; dadlani.net</p>

    <div class="crest-bottom" aria-hidden="true">
      <div class="crest-line"></div>
      <div class="crest-diamond"></div>
      <div class="crest-line right"></div>
    </div>

    <p class="tagline">A home on the web for the Dadlani family</p>

  </main>

  <div class="divider-wrap" aria-hidden="true">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line"></div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 &nbsp;·&nbsp; dadlani.net &nbsp;·&nbsp; All rights reserved</p>
  </footer>

</body>
</html>
